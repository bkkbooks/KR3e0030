body:
  text: 全生指迷方卷一宋王貺編脉論論曰人以天地之氣生四時之法成是以有五藏六府四肢十二經三百六十五穴以象五運六氣四時十二月周天之度陰陽變化與天地同流乖其氣逆其理則陰陽交錯府藏偏毗脉行遲速榮衞失度百病從生非脉無以探賾索隱所謂脉者乃天真之元氣有生之精神精神去幹脉理乃絶故上古聖人體性鑒形剖别藏府詳辨經絡會通内外各著其情氣穴所發各有腧名善診脉者靜意視義觀其變於㝠㝠之中以神合神悠然獨悟口弗能言先别陰陽審清濁而知分部視喘息聽音聲而知病所生所謂陰陽者至者為陽謂随呼而出也去者為陰謂随吸而入也動者為陽鼓擊躁急也靜者為陰來去沈沈黙黙也數者為陽謂一呼一吸六至也遲者為陰謂往來不滿三至也於三部九候之内察其脉形有獨異者謂獨大獨小獨疾獨遲獨不應四時者乃受病之所也辨五藏六府部位脉法左手寸口脉浮取之屬小腸為府沈取之屬心為藏其經則手太陽少陰左手關上脉浮取之屬膽為府沈取之屬肝為藏其經則足少陽厥陰左手尺中脉浮取之屬膀胱為府沈取之屬腎為藏其經則足太陽少陰右手寸口脉浮取之屬大腸為府沈取之屬肺為藏其經則手太陰陽明右手關上脉浮取之屬胃為府沈取之屬脾為藏其經則足太陰陽明右手尺中脉浮取之屬三焦為府沈取之屬心胞絡又屬右腎其經則手少陽厥陰辨人迎三部趺陽九候五藏六府脉法論曰診脉之法其要有三一曰人迎在結喉兩傍取之應指而動此部法天也二曰三部謂寸關尺也于腕上側有骨稍高曰高骨先以中指按骨謂之關前指為寸部後指為尺部尺寸以分陰陽陽降陰升通度由關以出入故謂之關此部法人三曰趺陽在足面繫鞋之所按之應指而動者是也此部法地三者皆氣之出入要㑹所以能决吉凶死生凡三處大小遲速相應齊等則為無病之人故曰人迎趺陽三部不參動數發息不滿五十未知生死以三者為决死生之要也故人迎一盛病在太陽謂陽極也四盛以上為隔陽謂無陰以收也寸口一盛病在少陰二盛病在太陰三盛病在厥陰厥有盡也四盛以上為關隂謂無陽以繫也隔陽者氣上而不能下則吐逆關隂則閉塞大小便不通皆死不治九候者謂三部之位一位有三候浮取之屬陽沈取之屬隂中得之為胃氣故無胃氣則死五藏之脉輕手于皮膚得之者肺也至肌得之者心也至肉得之者脾也至筋得之者肝也至骨得之者腎也五者輕重皆應是謂五藏之氣全也又有推而外之在經絡推而内之在血脉凡診平人之脉當以平旦隂氣未動陽氣未散飲食未進脉絡調和可以見有餘不足之脉一呼行三寸一吸行三寸呼吸行六寸而脉四至呼吸之間又一至此盛脉得天全者也若過十息脉應五十動又須與氣相應往來緩急得中潤澤如慢水流行源源者此夀脉無疾也若不滿五十動一止此一藏之氣絶四歲死三十動一止三嵗死二十動以下一止期以嵗月死若與形氣不相應往來短促枯燥無首尾此不夀之脉而多病凡診病脉則不以晝夜審脉所以察其由則寒熱虚實見矣凡脉病人不病者死人病脉不病者生診諸病證脉法論曰脉變于内病形于外相參以察其理氣熱脉滿是謂重實脉實以堅謂之益甚上下相失不可數者死謂至數也脉口熱而尺反緩皮膚外證也滑則從濇則逆寸口膚熱而尺膚寒絡氣不足也尺膚熱脉滿寸口膚寒脉濇是經氣不足絡氣有餘也脉寸虚尺虚是謂重虚重虚者死寸虚者病情無常神不守也尺虚者行歩恇然脉滑則生濇則死脉急大堅尺濇而不應謂之形滿手足溫則生寒則死乳子中風熱喘鳴肩息脉緩則生急則死下痢白沫脉沈則生浮則死下痢膿血脉懸絶則死滑則生浮濇之脉身有熱者死癲疾之脉搏大而滑久久自已脉小堅急死不治人病口甘而渴此數食甘美而多肥五氣之溢也謂之脾癉病人口苦此因數謀慮不决膽虚氣上溢是謂膽癉凡消癉之脉實大病久可治病人身熱如炭頸膺如格人迎躁盛喘息氣逆太隂脉微細如髪者死不治謂氣口與人迎不相應也心脉滿大癎瘛筋變肝脉小急癎痓筋攣肝脉騖暴有所驚駭無故而瘖脉不至不治自已謂氣暴厥也氣復則已腎脉小急肝脉小急皆為瘕肝脉併沈為石水併浮為風水併虚為死併小弦為驚腎脉大急沈肝脉大急沈皆為疝肺沈摶為肺疝太陽急為瘕膀胱氣也太隂急為脾疝少隂急為癎厥心病也少陽急為驚膽病也脾脉沈鼔為腸癖由飽食而筋脉横解腸癖為痔胃脉沈鼔濇胃外鼔大心脉小急皆為偏枯年不滿二十者三嵗死脉至而摶血衂身熱者死心肝脉小沈濇為腸癖心脉至如喘名曰暴厥不知與人言脉至如數使人暴驚三四日自已肺脉有餘病皮痺閉不通而生瘾疹不足病肺痺寒濕脾脉有餘病肉痺寒中隂隔塞也不足病脾痺肝脉有餘病筋痺脇滿不利不足病肝痺腎脉有餘病骨痺身重不足病腎痺凡隂病見陽脉者生謂病人四肢厥惡寒多汗脉得洪大數實也陽病見隂脉者死謂病人身熱狂躁譫言欲飲水脉得沈細微遲也辨脉形及變化所主病證法浮脉之狀在皮膚輕手得之重按則似有若無王於秋主肺主風主虚乏短氣秋得之為順春得之為賊邪冬得之為虚邪夏得之為實邪又為微邪其病不治自愈純浮為感風浮弦為虚勞浮𦂳為風寒浮芤為衂血浮滑為風痰浮洪為風氣壅滯浮微為氣不足浮緩為風虚四肢不隨浮濇為傷肺咯血𠻳血浮遲為傷憊浮弱為虚損浮濡為氣血俱不足又看見于何部位以臓腑經絡推之餘皆倣此消息沈脉之狀取于肌肉之下得之主藏病沈滯伏匿在寸為心肺鬱伏悲憂不樂在關為肝脾不利中滿善噫䐜脹濕勝則腫滿溏泄食不化支膈胠脇滿善恐在尺則為石水腹腫硬以指彈之殻殻然有聲小便澁沈𦂳為腸間積寒痛沈澁結為五氣積聚成形沈數或疾為骨蒸沈滑為腎消骨枯善渴小便數純沈為腫重足膝不利不得履地得之于隂濕之氣沈而微五藏氣衰骨痿不能起遲脉之狀往來極遲一息三至為隂盛陽虚之候若手足厥不回者死五藏氣短不能朝于氣口肺腎俱衰也太素脉訣作肺腎俱絶陳無擇三因方云遲者應動極緩與人迎相應則濕寒凝滯與氣口相應則虚冷沈積遲為寒為痛遲而濇為癥瘕咽酸數脉之狀往來急數一息六至為陽盛隂微之候寸脉見之為熱為燥為煩左關為目赤頭疼煩滿右關為口臭胃煩嘔逆尺中見為小便黄赤大便閉澁與人迎相應為熱與氣口相應或為瘡洪脉之狀大而隱指若大而散漫是謂氣衰大而浮風客于衞欬出青黄膿如彈丸大若不出則傷肺下利得脉大利益甚霍亂得之則吉又其脉主夏屬心虚脉之狀浮大無力遲而且柔又如蜘蛛絲此陽氣衰少隂氣獨居為多汗亡陽形氣蕭索其人不夀散脉之狀浮而無力至數不齊渙漫不收更甚于虚或來多去少按之如無此氣血俱虚根本脫離之候左寸軟散為陽虚不斂右寸見之為氣耗汗出肝脉軟散色澤者當病溢飲脾脉得之色不澤當病足胻腫尺脉見散為精氣衰耗又產婦得之生孕婦得之死芤脉之狀如浮而大于指面之下其形中斷又如流水不相續或如瀉漆之形斷而倒收又似弦而軟太素脉訣云芤脉之狀中空弦散主吐血嘔血衂血男子失精婦人胞漏半產血崩又曰其狀弦大弦則為减大則為芤弦芤相搏此名為革金刑木而傷肝也芤而滑嘔吐甚則亡血芤而數陽陷隂中血妄行芤而𦂳風冷入血下血如豚肝臍腹痛死不治芤而弦因失血致勞傷芤而微或散久成血枯濡脉之狀極軟弱如以指按水中綿如有如無太素脉訣云諸部脉形按之極小為隂陽俱不足濕冷霧露之氣所傷為病頭重如以濕熱之物裹首大筋軟短小筋弛長為痿弱骨不能立又為亡津液精神不收十便良方云精神乾急或偏枯血脉痺得之風冷濕氣也餘同前又為脛痠枯細手足常厥冷肉理不密微脉之狀極微或似有似無為氣血不足為虚憊亡血亡汗小便數或白濁若微數為隂虚客陽内熱穀氣少也若在尺部腎脂枯髄不滿骨若在左關則肝虚血不足目視昏昏筋緩弱若在右關則虚滑泄注穀不化腸鳴及漿粥不入胃若在右寸則為肺損背寒口中如含霜雪欬𠻳肌踈不可以風短氣若在左寸為心虚恍惚憂思不樂多恐如人將捕之若六部俱微則陽不及四肢足脛冷手足厥常欲湯火煖之陳無擇三因方云微者極細而軟似有若無與人迎相應則風暑自汗與氣口相應則微陽脫泄八裏病脉微為虚為弱為衂為嘔為泄為亡汗為拘急微弱為少氣為中寒革脉之狀渾渾革至如湧泉謂出而不返也為隂氣隔陽又為溢脉蓋自尺而出上于魚際亦謂之離經無根本也又覆脉之狀自寸口下退過而入尺皆必死之脉也伏脉之狀重于沈指下尋之方得蓋時見時隱也太素脉訣云伏脉之狀其形沈伏隱隱其位此隂陽之氣相伏也或隂中伏陽陽中伏隂脉疾為伏陽内熱身雖寒而不欲蓋衣脉遲小有來無去此伏隂在内陽氣不得入也其人身雖熱而但欲覆被向火脉實者有伏氣在内濇者有動氣在左則左病在右則右病在尺則居臍上下居臍上為逆居臍下為從牢脉之狀如弦而實尋之則散太素脉訣云指下尋之不動為五勞六極七傷之病若加數疾則發熱加短遲則發寒疾遲不常為寒熱支體迫急情思不樂實脉之狀舉按有力重按隱指愊愊然氣不利亦主伏陽在内蒸熱勞倦胃氣壅塞為内癰實數為三焦閉熱大便祕實滑為癖飲癥瘕留聚之病實大為氣盛閉寒太素脉訣實大作實洪實沈為藏府氣不通帶短太素脉訣云實而短為宿穀不化弱脉之狀小而無力為精不足短氣表裏俱衰為暴下隂併于陽汗出不止者死又為脚弱筋緩足不能履地惡寒不可出風細脉之狀細細如線太素脉訣云其形細微隂氣勝陽也又為手足寒氣少慘慘不舒暢又血不榮于四肢謂寒則澁而不流行也太素脉訣云又主冷洩痢緩脉之狀不遲不疾一息四至往來得中實得土氣太素脉訣云緩脉之狀如栁葉也緩甚為病四肢不收受濕而痺緩而沈脾氣滯志意不舒展氣痞多噎緩而濇肌肉不仁津液不流行榮衞失度因以致風緩而微為消氣緩而滑為熱中多食緩而短穀不化為溏泄緩而浮為風嚲曵陳無擇三因方云緩者浮大而軟去來微遲與人迎相應則風熱入藏與氣口相應則怒極傷筋緩而在下為風為寒為弱為痺為疼為不仁為氣不足為眩暈緩而滑為熱中緩而遲虚寒相搏食冷則咽痛濇脉之狀往來極濇如水不能流或聚于指下或綿綿如瀉漆斷而倒收又似止非止太素脉訣云濇脉之狀如刀口到指不離其所主男子亡血失精婦人胎姙不成月候凝澀或崩傷不止五帶敗血在腹或血瘕成形筋急寒痺浮濇為肺病咯血欬𠻳虚勞濇中時弦為金木相剋脇下痛不得臥者死在左寸為心痺寒慄病積溲血在左尺為病小腹積氣在右關則病心腹時滿在左關則病筋急積寒結脉之狀大小不定往來不拘數至時一止主氣不流行腹中癥癖氣塊成形或因大病後亡津液亡血或驚恐神散而精不收或夢漏亡精又多慮而心氣耗也若無是因則其人夀不過一二年代脉之狀其來如斷絶而相待其息以至時搏而動主血氣虧損或驚憂積甚形氣不相得也滑脉之狀指下如水之流或如轉珠無滯礙太素脉訣云不緩不洪不實如珠之形主嘔吐主飲滑而弦細者為支飲欬逆倚息面浮腫滑而𦂳停寒積飲吞酸腸間漉漉有聲滑而弦留飲在胃頭痛而眩滑而數為中暍甚則為痓手足瘛瘲搐搦也滑而緩熱中消穀引食滑而細沈為消渴帶微為消中不渴小便數滑實為氣盛上熱滑大而數為心氣熱越多汗滑而微小為無力盜汗在尺滑為狐風疝在右手寸口為肺風疝在右關則為脾風疝在左關則為肝風疝𦂳脉之狀如按繩激指三部通度與弦相似而有力舉按皆有餘主中寒腹痛切急在寸口則中寒口噤頭痛惡寒欲得覆被火炙在關上則胃冷吞酸中脘臍腹痛下利筋寒或轉筋霍亂欬嘔膽汁𦂳數為冷熱痢下膿血或身熱飲食如故有痛處則結癰疽在尺為寒疝痛促脉之狀自尺上寸口促急有來無去太素脉訣作有來時止復來此榮衛無度數隂氣促陽也又腎氣離經升而不降又為無隂而陽無以繫也若時氣促數上出寸口此陽併于血病赤斑十死一生若脉見斷絶為黑斑獨陽攻藏氣絶死不治動脉之狀鼓動而暴于指下不常氣血相乘搏擊而動也或鼓于陽則一陽為鉤如夏脉之盛或鼓于隂則一隂為毛如秋氣之急切勁烈鼓陽勝急曰弦隂緩而陽急也鼓陽至而絶曰石陽辟隂孤也隂陽相過曰溜氣相鼓作而動也弦脉之狀如張弓弩弦應指有力重按則軟弱太素脉訣云狀如琴弦主春氣主肝藏主虚主痰主瘧主勞弦而微氣不足筋緩不榮弦急似數非數綿綿之狀勞傷氣促急四肢煎厥無首尾而促疾虚勞不足弦弱而疾夜多盜汗弦短而大榮衞勞傷内急外緩兼數則熱目視昏昏血不足也兼遲則寒筋脉急攣弦濇因失血女子則月閉血瘕弦𦂳為虚寒裏急寒疝少腹痛面青下利弦遲而濇出入無首尾為寒閉血少筋乾急太素脉訣作弦而急或偏枯血脉痺得之風冷濕氣也十便良方云沈而微五藏氣弱骨痿不能起短脉之狀往來極短不待息盡而回或無首尾但見于指面亦不待氣來而至其人短氣息急或不能長息又為大下脱氣又主久病長脉之狀往來指下息隨而盡其有餘如操帶物之長太素脉訣云長脉之狀來往至長稟賦氣强勝血而氣擁其人夀若加大而數為病陽盛内熱當利三焦
