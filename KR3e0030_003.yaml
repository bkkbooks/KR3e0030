body:
  text: 全生指迷方卷三宋王貺編諸積論曰若腹中成形作塊按之不移推之不動動輒㣲喘令人寒熱腹中時痛漸漸羸瘦久不治之多變成水虚勞亦由憂思驚恐寒熱得之陰陽痞滯氣結成形其脉結澀謂之積氣萬安丸主之萬安丸大㦸炒甘遂炒牽牛炒五靈脂吴茱萸炒延胡索炒各半兩芫花炒石膏細研分各一膽礬一錢研細墨燒一錢研斑蟊二十箇去頭足翅巴豆去皮出油一錢芫青四十箇去頭足翅右為細末白麫糊為丸如菉豆大生薑橘皮湯下一粒日二服病去六七分即住服史氏指南方有續隨子郁李仁信砒各一分無延胡索巴豆袁當時大方有砒一分無斑蟊芫青巴豆若左脇下如覆杯有頭足久不已令人發痰瘧寒熱欬或間日也始由肺病傳肝肝當傳脾脾乗王而不受邪其氣留于肝故結而為積其脉澀結麝香丸主之麝香丸蓬莪茂炮一兩桂心當歸人參各半兩細辛去苗川烏頭炮去皮臍各一分巴豆一分去皮出油右為細末白麫糊為丸如菉豆大食後飲下三粒史氏指南方無蓬莪茂有芍藥一兩若心下如盤久不已令人四肢不收發黄疸飲食不為肌膚始由肝病傳脾脾當傳腎腎乘王而不受邪氣留予脾其脉緩澀時結謂之痞氣三稜煎主之孫氏仁存方云兼治食癥酒癥血蠱氣塊血瘕時發刺痛婦人血分男子脾氣橫泄三稜煎京三稜剉蓬莪茂剉各四兩芫花一兩右用米醋三升煮令醋盡獨炒芫花令乾餘二味切片子焙乾同為末白麫糊為丸如豌豆大橘皮湯下三粒以知為度若從少腹上衝心胸咽喉發痛如㹠肝狀發作欲死由脾病傳腎腎當傳心心乗王而不受邪氣留于腎結而為積其脉沈結謂之賁㹠賁㹠湯主之賁㹠湯甘草炙川芎半夏湯洗七遍芍藥黃芩各二兩葛根甘李根皮各五兩右為散每服五錢水二盞薑五片同煎至一盞去滓溫服史氏指南方加當歸一兩孫氏仁存方加乾薑一兩一分當歸二兩無葛根若脉大而散時一結謂之伏梁伏梁丸主之伏梁丸青皮白馬尿浸三日令軟透切三十箇巴豆去皮十五箇與青皮同炒乾去巴豆不用羌活半兩右為末白麫糊為丸如菉豆大飲下五粒未知漸加至十粒若身體及髀股胻皆腫環臍而痛不可動動之為水亦名伏梁椒仁丸主之椒仁丸五靈脂吴茱萸炒延胡索炒各半兩芫花醋浸一宿炒一分椒仁甘遂炒續隨子去皮研郁李仁去皮研牽牛炒熟各半兩砒一錢研石膏火煅過一分研附子炮去皮臍木香各半兩膽礬一錢研右為細末白麫糊為丸如豌豆大橘皮湯下一粒早辰日午臨臥服如婦人血分則去木香加斑蟊芫青各三十枚去頭足翅炒當歸半兩諸痛論曰諸心腹痛者或外邪來客或氣相干其卒然痛而即止者此寒氣客于脉外得寒則縮踡絀急外引小絡得熱即止宜先用熨法後以良薑散主之熨法指南方云治心腹痛卒然而止遇寒再發鹽半斤炒極熱右以舊帛包熨痛處指南方云漸去至一重良薑散高良薑五兩厚朴去皮薑汁塗炙二兩當歸桂心各三兩右為散每服五錢水二盞煎至一盞去滓溫服若腰者腎之外候足太陽經之流注如痛連小腹不得仰俛惙惙短氣由腎氣虚弱有所不榮補腎散主之補腎散杜仲去粗皮杵碎酒拌炒焦一兩桂去皮牡丹皮各半兩右為末每服三錢用豬腎一箇批開糝藥在内入鹽少許以線紥定水煑熟空心食之若𨼆𨼆腰痛以熱物熨痛處即少緩由處卑濕復為風邪傷足太陽之經其脉緩澀白术散主之白术散白术二兩芍藥三兩桂去皮附子炮去皮臍各一兩剉右為細末溫酒調二錢匕食前服若腰痛不能轉側由勞役動傷經絡或從高墮下氣滯于腰正氣流行相搏則痛其脉沈大小不常謂之䐴腰趁痛丸主之趁痛丸諸氣門見趁痛散若腰如錐刀所刺大便黒色小便赤黒此留血滯于腰間謂之血瀝腰痛其脉濇當歸丸主之當歸丸當歸三兩剉碎水蛭好者炒三十箇桃仁去皮尖三十箇炒研右為末酒糊為丸如梧桐子大酒下十粒未知加至三十粒若腰冷腹重如帶五千錢如坐于水由腎經為陰濕所逼復受風冷久不治變成水病腎著湯主之腎著湯甘草炙乾薑各二兩白茯苓白术各四兩右為散每服五錢水二盞煎至一盞去滓食前溫服若腰脊不舉由遠行勞倦逢大熱而渴陽氣内伐熱舍于腎水不勝火則骨枯而髓减蓋陽明併腎則腎脂枯而宗筋不調宗筋主束骨而利機關也是謂骨痿兔絲子丸補腎散主之兔絲子丸絲子揀淨酒浸透搗爛焙乾乾地黄焙各二兩杜仲去粗皮杵碎酒拌一宿炒焦三兩牛膝酒浸一兩􅒝薢一兩右為細末煉蜜為丸如梧桐子大飲下三十粒食前服補腎散見前若脇痛不得息痛則欬而汗出由邪客于足少陽之絡屬膽宜灸足小指次指𤓰甲上與肉交處七壯竅陰二穴也若臂外臁痛手不及頭心煩喉痺者由邪客于手少陽之絡以針刺手大指次指之端去𤓰甲如韭葉令血出而止若臂痛不能屈伸此邪客于臂掌之間取腕踝骨後以指按之極痛刺之留二呼急出鍼或灸若筋拘攣背急痛引脇下從項推下夾脊按之應手痛者于其上灸七壯未定加至十四壯若痛引小腹由寒氣客于厥陰之脉或脇肋相引腎肝脉弦大久成寒疝桂枝烏頭湯主之桂枝烏頭湯桂心三兩芍藥三兩烏頭炮去皮臍二兩半甘草炙二兩右為散每服五錢水二盞薑五片棗一枚同煎至一盞去滓入蜜半匙許再煎一二沸稍熱服眩暈論曰頭眩之狀謂目眩旋轉不能俛仰頭重不能舉目不能開開則不能視物史氏指南方云觀物如反或如浮水或身如在舟車上是謂徇蒙招尤目瞑耳聾下實上虚過在足少陽厥隂由肝虚血弱則風邪乃生蓋風氣通于肝又曰諸風掉眩皆屬于肝左手關脉虚弦謂之風眩香芎散桃紅散主之香芎散芎藭獨活旋覆花藁本去苗細辛去苗蔓荆子各一兩石膏研甘草炙荆芥穗各半兩右為末每服三錢水一盞薑三片同煎至七分去滓溫服不拘時桃紅散白附子新羅者黄丹等分右同炒候黄丹深紫色篩出黃丹不用只將白附子為末茶清調下一錢匕若頭眩發則欲嘔心下溫溫胸中如滿由胸上停痰胃氣不流行盤鬱不散氣上騰入腦腦滿則眩關脉沈弦或謂之痰眩旋覆花丸主之旋覆花丸見前熱證門若但運而不眩發則伏地昬昬食頃乃蘇由榮衞錯亂氣血溷濁陽氣逆行指南云此由邪客諸氣隂陽特厥上者不得下下者不得上上下相隔精神散亂上下相隔氣復通則蘇脉虚大而澀謂之氣運流氣飲子草烏頭湯主之流氣飲子紫蘇葉青皮當歸洗芍藥烏藥茯苓桔梗川芎半夏湯洗七遍焙乾為末薑汁和隂乾黄耆枳實麩炒去瓤防風各半兩甘草炙橘皮洗各三分木香一分連皮大腹剉薑汁浸一宿焙一兩右為散每服五錢水二盞生薑三片棗一個同煎至一盞去滓溫服草烏頭湯草烏頭去皮尖生用細辛去苗茶牙等分右為散每服五錢水二盞煎至一盞去滓緩緩服盡若但欲仰視目瞑不能開開而眩唾出若涕惡風振寒由腎氣不足動作勞損風搏于肺腎氣不足膀胱不榮于外故使彊上瞑視因其勞而受風在肺故唾出若涕而惡風謂之勞風芍藥黃耆湯主之芍藥黃耆湯芍藥二兩黃耆三兩川芎二兩烏頭炮去皮半兩右為散每服五錢水二盞薑三片棗一個同煎至一盞去滓溫服厥證論曰若暴厥卒然不知人事身脉皆動其狀如尸聽其耳中如循嘯聲股間暖由邪氣折于手少陰太陽足陽明之絡五絡俱竭腎氣㣲少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣下墮陰氣卒上而不交陰陽離居身溫而汗出氣復反則唇青身冷此為入藏即死謂之尸厥先以竹管吹左耳極三度又吹右耳如前炙熨斗熨兩脇以石菖蒲末著舌下及吹鼻中又刺足大指内側𤓰甲去端如韭葉入一分留三呼隠白穴也出之又刺足心湧泉穴如上法又刺足中指𤓰上令破如上法謂厲兌穴也又刺手大指内側去端如韭葉又刺手心主謂中衝穴也又刺掌後銳骨之端謂神門穴也又剔取頭左角之髮燒灰酒服方寸匕不能飲灌之後宜太一神精丹太一神精丹方缺若居常無苦忽然如死身不動默默不知人目閉不能開口噤不能語又或似有知而惡聞人聲或但如眩冒移時乃寤此由亡汗過多血少氣併血中氣血爭陰陽亂氣過血還則陰陽復通而人乃寤謂之鬱冒血厥此證多生婦人男子亦有之白㣲湯倉公散主之白㣲湯白微當歸各一兩人參半兩甘草炙一分右為散每服五錢水二盞煎至一盞去滓溫服倉公散瓜蒂藜蘆礜石火煅一伏時研雄黃研右等分為末以豆大吹鼻内醒為度若卒然昬冒無所知或妄言語此由暴驚心無所倚神無所歸久不治陰陽相併或陰氣併陽陽氣併陰令人九竅閉塞狀類尸厥菖蒲散主之菖蒲散石菖蒲一兩麝香一錢研右為細末酒調服二錢或飲亦得若忽然瘛瘲瞋目不能語喉中有聲大便不通胸滿欲嘔或惡人聲聞人聲則惕然而驚或時呌此得之暴驚氣積而不散伏痰聚于中脘濕積于脾久而脾氣既耗水氣乗之則風動四末宜先吐之以勝金丸次宜玉壺丸以大便利即止有熱則脉洪數此脾鬱于心鐵粉丸主之勝金丸方缺玉壺丸方缺鐵粉丸鐵粉二兩硃砂一兩研牛黄研天竺黄研鉛霜研各半兩天南星炮一兩右為末薑汁煮糊為丸如梧桐子大生薑湯下五丸若素無疾而暴得瘛瘲發訖即如常經隔月日又復如前由陰陽失其常度氣血相併也此謂之癎龍齒丸烏鴉散獨活湯主之龍齒丸牛黄研麝香研各半錢羚羊角剉龍齒龍骨羊齒火煅赤各一分硃砂研半兩蛇退炒白僵蠶炒各一分右為末煉蜜和丸如梧桐子大飲下五丸臨卧服烏鴉散臘月烏鴉壹箇去足嘴大翅用麝香一錢填口内以好紙通裹了再用鹽紙和泥團了候乾炭火燒煙盡取出為末更入麝香一錢研和飲調方寸匕日二服獨活湯獨活一兩細辛去苗一分僵蠶炒半兩牡丹皮三分防己半兩紫菀去苗一分右為散每服五錢水二盞煎至一盞去滓溫服若病人喜怒不常獨閉户牖而處惡聞人聲者蓋陽氣常動因暴折而難决肝膽氣鬱而不伸故令喜怒謂之陽厥宜鐵落飲無食肉及菖蒲散鐵落飲方缺菖蒲散見前若言語不避親疎或棄衣而走登高而歌此思慮用心太過神散不藏又或悲哭忽忽不樂神有餘則笑為狂勝金丸主之神不足則悲露朱丹主之勝金丸方缺露朱丹好硃砂一兩碎右用真琉璃器盛之露四十九夜陰雨不算數研細入牛黃半錢研和滴熟蜜珠子丸如梧桐子大空心人參湯下一粒若首腫頭重足不能行發則眴仆此太陽厥也烏頭湯主之一烏頭湯見前眩運門若喜怒嗌痛不肉食氣奔走上刺足下中央之脉血出而止痰飲論曰若咽中如炙肉臠嚥之不下吐之不出由胃寒乗肺肺胃寒則津液聚而成痰致肺管不利氣與痰相搏其脉澀半夏厚朴湯主之半夏厚朴湯半夏湯洗七遍五兩厚朴去皮薑汁塗炙三兩茯苓紫蘇葉各二兩右為散每服五錢水二盞生薑十片同煎至一盞去滓食前溫服枳术湯艾元英如宜方云若心下如盤邊如旋盤由飲癖停留不散白术四兩枳實麩炒去瓤二兩右為散每服五錢水二盞煎至一盞去滓食前溫服若腹滿按之没指隨手而起餘與正水皆同但四肢聶聶動其脉亦浮由肺氣久虚為風邪所客氣不得運百脉閉塞氣結陰聚成水謂之皮水亦宜發汗先以防己湯次以大豆散防己湯防己三兩人參四兩桂心二兩茯苓四兩右為散每服五錢水二盞煎至一盞去滓溫服大豆散方缺若咳嗽喘不得卧面浮腫脉弦急或遲由肺胃停寒水聚成飲支乗于心氣不得下謂之支飲宜先用十棗湯瀉之後宜防己湯主之十棗湯芫花炒黒甘遂大㦸各等分大棗十枚右先煮棗去滓内前藥末强人服一錢虚人服五分若病不除再服得快下為度後以糜粥自養防己湯見前消證論曰消渴之病其來有二或少服五石湯丸恣慾不節不待年高氣血衰耗石性獨存火烈焦槁精血涸竭其狀渴而肌肉消又有積久飲酒酒性酷熱薰蒸五藏津液枯燥而血澀其狀渴而肉不消如解五石毒者宜罌粟湯欲止渴者宜絲子丸大渴而加煩熱者宜馬通散栝樓粉罌粟湯見前痺證門絲子丸絲子不計多少揀淨水淘酒浸三宿右控乾乗潤搗羅為散焙乾再為細末煉蜜和丸如梧桐子大食前飲下五十粒一日二三服或作散飲調下三錢瑣碎録云用酒浸晒于日中三兩日一換酒用時洗去酒濃煎湯飲馬通散方缺栝樓粉方缺若其人素渴引水一旦不飲不渴小便日夜數十行氣乏肉消脫此消中腎氣敗也茱萸丸主之茱茰丸蓯蓉洗切酒浸焙五味子炒山茱茰乾山藥等分右為末酒糊為丸如梧桐子大飲下三十粒空心服疸病論曰黄疸之病皆屬于脾脾屬土而色黄惡濕濕勝則土氣不行而鬱故發則真色見蓋黄疸本得之濕瘀熱在裏濕熱相搏身必發黄若先有留熱而後為濕氣所加則熱多而濕少治之先導其熱若先為濕氣所乘而後有熱則濕多而熱少治之先去其濕去其濕則熱從而去亦有因冷痞結陰加于陽上下氣不通而脾氣不行則陰氣鬱而生濕其狀胸中痞嘔逆時惡寒當先除痞利其小便則濕自去脉洪大大便利加渴者死脉微小小便不利不渴者生若病人一身悉黃四肢微腫胸滿不得卧汗出如黄蘗汁此由大汗出卒入水中所致苦酒湯主之苦酒湯黄耆五兩芍藥桂取心各三兩右為散每服五錢水一盞半苦酒半盞同煎至一盞去滓溫服若因他病未除忽然一身面目悉黄如橘瘀熱在裏也或因大熱以冷水洗之濕熱相搏薰蒸肌肉謂之黄疸蘗皮湯主之茵陳五苓散主之蘗皮湯黄蘗黄連黄芩各等分右為散每服五錢水一盞半煎至一盞去滓溫服茵陳五苓散茵陳一兩豬苓茯苓白术炒各十八銖澤瀉一兩半桂心半兩右為散每服五錢水一盞半煎至一盞去滓溫服若心下懊痛足膝脛滿小便黄面發赤斑由大醉當風入水濕加于熱内蒸脾氣謂之酒疸治屬飲家茯苓半夏湯主之茯苓半夏湯茯苓四兩半夏二錢半湯洗七徧旋覆花三錢甘遂剉末炒一錢右㕮咀水二盞煎至一盞去滓將甘遂末分二服用藥汁半盞調服以利為度若脉浮腹滿欲嘔吐者先吐之𤓰蒂散主之脉沈腹滿大便秘先利之大黄丸主之瓜蔕散瓜蔕赤小豆秫米等分右為細末粥飲調方寸匕以吐為度大黃丸大黄煨葶藶各等分右為細末鍊蜜和丸如梧桐子大蜜湯下十粒以利為度
