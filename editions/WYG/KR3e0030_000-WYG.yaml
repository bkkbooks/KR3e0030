body:
  text: 提要全生指迷方四卷醫家類臣等謹案全生指迷方四卷宋王貺撰按書録解題貺字子亨考城人名醫宋毅叔之婿宣和中以醫得幸官至朝請大夫是書宋史藝文志作三巻而𫝊本乆絶故醫家罕所徵引或至不知其名今檢永樂大典所収按條掇拾雖未必盡符原本然大要已畧具矣方書所載大都皆標某湯某丸主治某病詳其藥品銖兩而止獨貺此書於每證之前非惟具其病狀且一一論其病源使讀者有所据依易於運用其脈論及辨脈法諸條皆明白曉暢凡三部九候之形病證變化之象及脈與病相應不相應之故無不辨其疑似剖析微茫亦可為診家之樞要謹詳加訂正分為二十一門依類編次而以論脈諸篇冠之於首因篇頁稍繁釐為四卷不復如其原數焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序余昔任左史遇疾瀕死考城王貺子亨為察衆工之用藥而余以生因以其所著全生方一編遺余藏之未暇讀也繼掌外制一日得異疾謀諸醫未决子亨笑曰毋恐此吾書所有也視某章病當某藥如方信宿而病良已於是始竒之歸居淮南去王城國偶有病秪訊於書謫三巴遷百粤去醫益逺又槖本以歸余余因為之表其端曰此書直而邃曲而通部居彪列而脉絡潛流形色昭彰而對治要妙知方者讀之智思横生不知者猶可按圖而愈疾真衞生之竒寳濟物之良術也至理不煩至語不費余非知道者而於此乎取之子亨當官不苟遇世變嘗慨然再請出疆萬里其論著此書用心救世利物不特此矣吴敏序自序徳彌大者常存乎好生之心志彌廣者每切于立言為教在上世則有伊尹逮後漢乃見張機祖述神農之經發明黄帝之道雖然術至通神之妙在乎知慮以為先藥至起生之功必因精能而後效天無棄物非人莫知所能人有常心非道莫知所適凝神自悟觸理皆分故能贊益天機悉體隂陽之變深窮造化博極生死之源候色驗形自契一時之理刳腸剖臆難傳後代之精至于湯液除疴砭石起死必當研窮性味斟酌淺深治理在于君臣協攻資乎佐使方書之行其來尚矣而人猶不能刻意研求專心致志攖邪抱病則束手無能制療處方則委身紕繆余竊悲之于是採古人之緒餘分病證之門類别其疑似定其指歸隂陽既明虚實可攷若能按圖求治足以解惑指迷雖未起死回生庻幾扶危拯困故號曰全生指迷以崇大倫之道焉考成王貺子亨序
